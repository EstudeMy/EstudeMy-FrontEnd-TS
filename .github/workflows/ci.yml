name: Release

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Instalar dependências
        run: npm install

      - name: Rodar build
        run: npm run build

      - name: Testes unitarios e Cobertura
        run: npm run test:coverage    

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Necessário para ler o repositório
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # Necessário para autenticar com o SonarCloud
        with:
          args: >
            -Dsonar.projectKey=EstudeMy_EstudeMy-FrontEnd-TS
            -Dsonar.organization=estudemy
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=**/*.test.ts,**/*.spec.ts

      - name: Instalar semver
        if: github.ref == 'refs/heads/main'
        run: npm install -g semver

      - name: Criar nova tag caso não exista
        if: github.ref == 'refs/heads/main'
        id: create_initial_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$(git tag)" ]; then
            git config --global user.name 'github-actions'
            git config --global user.email 'github-actions@github.com'
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
            git tag -a v0.0.0 -m "Initial release"
            git push origin v0.0.0
          fi

      - name: Calcular nova versão
        if: github.ref == 'refs/heads/main'
        id: version
        run: |
          git fetch --tags
          LAST_TAG=$(git describe --tags `git rev-list --tags --max-count=1`)
          if [ -z "$LAST_TAG" ]; then
            LAST_TAG="v0.0.0"
          fi
          echo "Versão Atual: $LAST_TAG"
          
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s")
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s")
          fi
          
          echo "Commits desde a última tag:"
          echo "$COMMITS"
          
          # Inicializando variáveis
          MAJOR=0
          MINOR=0
          PATCH=0
          
          # Analisando mensagens de commit
          for COMMIT in "$COMMITS"; do
            if [[ "$COMMIT" == *"BREAKING CHANGE"* ]]; then
              MAJOR=1
            elif [[ "$COMMIT" == *"feat"* ]]; then
              MINOR=1
            elif [[ "$COMMIT" == *"fix"* ]]; then
              PATCH=1
            fi
          done
          
          # Calculando a nova versão usando semver
          CURRENT_VERSION=${LAST_TAG#v}
          NEW_VERSION=$CURRENT_VERSION
          if [[ $MAJOR -eq 1 ]]; then
            NEW_VERSION=$(semver -i major $CURRENT_VERSION)
          elif [[ $MINOR -eq 1 ]]; then
            NEW_VERSION=$(semver -i minor $CURRENT_VERSION)
          elif [[ $PATCH -eq 1 ]]; then
            NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
          fi
          
          if [ "$NEW_VERSION" = "$CURRENT_VERSION" ]; then
            NEW_VERSION=$(semver -i patch $CURRENT_VERSION)
          fi
          
          echo "Nova versão: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Atualizar versão no package.json
        if: github.ref == 'refs/heads/main'
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version
          
      - name: Commit e push
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git
          git add package.json
          git commit -m "chore(release): version ${{ steps.version.outputs.new_version }}" || echo "Sem mudanças"
          TAG="v${{ steps.version.outputs.new_version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag já existe, pulando..."
          else
            git tag $TAG
            git push origin $TAG
          fi
          git push origin main

      - name: Obter versão do package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Enviar email em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com  # Update to your SMTP server
          server_port: 587
          username: ${{ secrets.EMAIL_ORIGEN }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}  # Use app password, not regular password
          subject: "Falha no CI (version) - Front-End-TS"
          body: "O processo de CI/versão falhou. Por favor, verifique os logs para mais detalhes."
          to: ${{ secrets.EMAIL_DESTINO }}
          from: ${{ secrets.EMAIL_ORIGEN }}

  build-hml:
    name: build-hml
    runs-on: ubuntu-latest
    needs: version
    environment: HML
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Configurar Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push Docker (HML)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_HML || 'http://localhost:5003' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/estudemy-frontend:hml
            ${{ secrets.DOCKER_USERNAME }}/estudemy-frontend:hml-${{ needs.version.outputs.version }}

      - name: Enviar email em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ORIGEN }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}  
          subject: "Falha no CI (build-hml) - Front-End-TS"
          body: "A build de HML falhou. Por favor, verifique os logs para mais detalhes."
          to: ${{ secrets.EMAIL_DESTINO }}
          from: ${{ secrets.EMAIL_ORIGEN }}

  build-prod:
    name: build-prod
    runs-on: ubuntu-latest
    needs: [build-hml, version]
    environment: PROD
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Configurar Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '22'

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build e Push Docker (PROD)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD || 'http://localhost:5004' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/estudemy-frontend:prod
            ${{ secrets.DOCKER_USERNAME }}/estudemy-frontend:${{ needs.version.outputs.version }}

      - name: Enviar email em caso de falha
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_ORIGEN }}
          password: ${{ secrets.EMAIL_APP_PASSWORD }}  
          subject: "Falha no CI (build-prod) - Front-End-TS"
          body: "A build de PROD falhou. Por favor, verifique os logs para mais detalhes."
          to: ${{ secrets.EMAIL_DESTINO }}
          from: ${{ secrets.EMAIL_ORIGEN }}